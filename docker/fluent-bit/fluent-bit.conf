[SERVICE]
    Flush 5
    Daemon Off
    Log_Level info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name tail
    Path /var/www/html/storage/logs/medflow.json
    Tag medflow.logs
    Parser json
    DB /tmp/medflow-logs.db
    Refresh_Interval 5
    Read_from_Head true

[FILTER]
    Name record_modifier
    Match medflow.logs
    Record service medflow-app

[OUTPUT]
    Name es
    Match medflow.logs
    Host elasticsearch
    Port 9200
    Index medflow-logs
    Logstash_Format On
    Replace_Dots On
    Suppress_Type_Name On
