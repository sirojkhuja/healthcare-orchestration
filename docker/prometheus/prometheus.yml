global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
  - job_name: medflow-app
    metrics_path: /internal/metrics
    authorization:
      type: Bearer
      credentials: medflow-prometheus-scrape
    static_configs:
      - targets:
          - nginx:80
