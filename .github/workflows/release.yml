name: Release Automation

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without a leading v
        required: true
        type: string
  push:
    tags:
      - 'v*.*.*'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Make scripts executable
        run: chmod +x .githooks/pre-commit .githooks/pre-push scripts/*.sh scripts/*/*.sh

      - name: Validate Docker Compose
        run: docker compose config >/dev/null

      - name: Bootstrap application workspace
        run: make bootstrap

      - name: Run release dry run
        shell: bash
        run: |
          args=(--version "${{ steps.version.outputs.value }}")

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            args+=(--allow-existing-tag)
          fi

          bash scripts/release/dry-run.sh "${args[@]}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.version.outputs.value }}
          path: build/release/${{ steps.version.outputs.value }}

  publish-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: prepare-release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-${{ needs.prepare-release.outputs.version }}
          path: build/release/${{ needs.prepare-release.outputs.version }}

      - name: Publish GitHub release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_BODY_PATH: build/release/${{ needs.prepare-release.outputs.version }}/CHANGELOG-${{ needs.prepare-release.outputs.version }}.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const version = process.env.RELEASE_VERSION;
            const tagName = `v${version}`;
            const body = fs.readFileSync(process.env.RELEASE_BODY_PATH, 'utf8');

            let release;

            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                tag_name: tagName,
                name: tagName,
                body,
                draft: false,
                prerelease: version.includes('-'),
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: tagName,
                body,
                draft: false,
                prerelease: version.includes('-'),
              });
            }
