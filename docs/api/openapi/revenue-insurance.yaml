openapi: 3.1.1
info:
  title: MedFlow Revenue and Insurance Fragment
  version: 0.1.0
paths:
  /api/v1/services:
    get:
      operationId: ListBillableServicesQuery
      tags: [Billing]
      summary: List billable services in the current tenant
      description: Returns tenant-scoped billable services filtered by category, activity, and free-text search.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/BillingSearchQuery'
        - $ref: '#/components/parameters/BillingServiceCategoryFilter'
        - $ref: '#/components/parameters/BillingActiveFilter'
        - $ref: '#/components/parameters/BillingLimit'
      responses:
        '200':
          description: Billable service directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillableServiceCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreateBillableServiceCommand
      tags: [Billing]
      summary: Create a billable service
      description: Creates a tenant-scoped billable service catalog record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBillableServiceRequest'
      responses:
        '201':
          description: Billable service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillableServiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid or duplicate service payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/services/{serviceId}:
    patch:
      operationId: UpdateBillableServiceCommand
      tags: [Billing]
      summary: Update a billable service
      description: Updates an existing tenant-scoped billable service.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/ServiceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBillableServiceRequest'
      responses:
        '200':
          description: Billable service updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillableServiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Billable service not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid or duplicate update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeleteBillableServiceCommand
      tags: [Billing]
      summary: Delete a billable service
      description: Hard-deletes an unreferenced billable service in the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/ServiceIdPath'
      responses:
        '200':
          description: Billable service deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillableServiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Billable service not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Billable service is still referenced by a price list item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/price-lists:
    get:
      operationId: ListPriceListsQuery
      tags: [Billing]
      summary: List price lists in the current tenant
      description: Returns tenant-scoped price lists ordered by default and active status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/BillingSearchQuery'
        - $ref: '#/components/parameters/BillingActiveFilter'
        - $ref: '#/components/parameters/BillingDefaultFilter'
        - $ref: '#/components/parameters/PriceListActiveOnFilter'
        - $ref: '#/components/parameters/BillingLimit'
      responses:
        '200':
          description: Price list directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreatePriceListCommand
      tags: [Billing]
      summary: Create a price list
      description: Creates a tenant-scoped price list with currency, effective dates, and default-list handling.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePriceListRequest'
      responses:
        '201':
          description: Price list created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid or duplicate price list payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/price-lists/{priceListId}:
    get:
      operationId: GetPriceListQuery
      tags: [Billing]
      summary: Get one price list and its items
      description: Returns a tenant-scoped price list with the current replacement-based item set.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/PriceListIdPath'
      responses:
        '200':
          description: Price list with items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListShowResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Price list not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: UpdatePriceListCommand
      tags: [Billing]
      summary: Update a price list
      description: Updates price-list metadata and may move the tenant default flag.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/PriceListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriceListRequest'
      responses:
        '200':
          description: Price list updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Price list not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid or duplicate update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeletePriceListCommand
      tags: [Billing]
      summary: Delete a price list
      description: Hard-deletes a tenant-scoped price list and cascades the current item set.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/PriceListIdPath'
      responses:
        '200':
          description: Price list deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Price list not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/price-lists/{priceListId}/items:
    put:
      operationId: SetPriceListItemsCommand
      tags: [Billing]
      summary: Replace the full item set for a price list
      description: Replaces every current price-list item. An empty item array is valid and clears the list.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/PriceListIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplacePriceListItemsRequest'
      responses:
        '200':
          description: Price list items replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceListMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Price list or referenced service not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid replacement payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices:
    get:
      operationId: ListInvoicesQuery
      tags: [Billing]
      summary: List invoices in the current tenant
      description: Returns tenant-scoped invoices ordered by lifecycle timestamps and invoice number.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/BillingSearchQuery'
        - $ref: '#/components/parameters/InvoiceStatusFilter'
        - $ref: '#/components/parameters/InvoicePatientFilter'
        - $ref: '#/components/parameters/InvoiceIssuedFromFilter'
        - $ref: '#/components/parameters/InvoiceIssuedToFilter'
        - $ref: '#/components/parameters/InvoiceDueFromFilter'
        - $ref: '#/components/parameters/InvoiceDueToFilter'
        - $ref: '#/components/parameters/InvoiceCreatedFromFilter'
        - $ref: '#/components/parameters/InvoiceCreatedToFilter'
        - $ref: '#/components/parameters/BillingLimit'
      responses:
        '200':
          description: Invoice directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreateInvoiceCommand
      tags: [Billing]
      summary: Create a draft invoice
      description: Creates a tenant-scoped draft invoice with monotonic invoice numbering.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid invoice payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/search:
    get:
      operationId: SearchInvoicesQuery
      tags: [Billing]
      summary: Search invoices in the current tenant
      description: Searches invoices by invoice number, patient display name, notes, and invoice filters.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/BillingSearchQuery'
        - $ref: '#/components/parameters/InvoiceStatusFilter'
        - $ref: '#/components/parameters/InvoicePatientFilter'
        - $ref: '#/components/parameters/InvoiceIssuedFromFilter'
        - $ref: '#/components/parameters/InvoiceIssuedToFilter'
        - $ref: '#/components/parameters/InvoiceDueFromFilter'
        - $ref: '#/components/parameters/InvoiceDueToFilter'
        - $ref: '#/components/parameters/InvoiceCreatedFromFilter'
        - $ref: '#/components/parameters/InvoiceCreatedToFilter'
        - $ref: '#/components/parameters/BillingLimit'
      responses:
        '200':
          description: Invoice search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/export:
    get:
      operationId: ExportInvoicesQuery
      tags: [Billing]
      summary: Export invoices as CSV
      description: Generates a CSV export for the current tenant invoice search filters.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/BillingSearchQuery'
        - $ref: '#/components/parameters/InvoiceStatusFilter'
        - $ref: '#/components/parameters/InvoicePatientFilter'
        - $ref: '#/components/parameters/InvoiceIssuedFromFilter'
        - $ref: '#/components/parameters/InvoiceIssuedToFilter'
        - $ref: '#/components/parameters/InvoiceDueFromFilter'
        - $ref: '#/components/parameters/InvoiceDueToFilter'
        - $ref: '#/components/parameters/InvoiceCreatedFromFilter'
        - $ref: '#/components/parameters/InvoiceCreatedToFilter'
        - $ref: '#/components/parameters/BillingExportLimit'
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv]
      responses:
        '200':
          description: Invoice export metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceExportResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Unsupported export format or invalid filters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/{invoiceId}:
    get:
      operationId: GetInvoiceQuery
      tags: [Billing]
      summary: Get one invoice
      description: Returns a tenant-scoped invoice with current item snapshots and totals.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      responses:
        '200':
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceShowResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: UpdateInvoiceCommand
      tags: [Billing]
      summary: Update a draft invoice
      description: Updates draft invoice metadata. Currency and price-list changes are rejected after items exist.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceRequest'
      responses:
        '200':
          description: Invoice updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice can no longer be changed through the draft CRUD route
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid invoice update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeleteInvoiceCommand
      tags: [Billing]
      summary: Soft-delete a draft or void invoice
      description: Soft-deletes a draft or void invoice while preserving audit history and invoice numbering gaps.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      responses:
        '200':
          description: Invoice deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice cannot be deleted in its current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/{invoiceId}/items:
    get:
      operationId: ListInvoiceItemsQuery
      tags: [Billing]
      summary: List invoice items
      description: Returns the current item set for one invoice.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      responses:
        '200':
          description: Invoice item collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceItemCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: AddInvoiceItemCommand
      tags: [Billing]
      summary: Add one invoice item
      description: Adds a draft invoice item using a current service snapshot and either explicit or price-list derived pricing.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceItemRequest'
      responses:
        '201':
          description: Invoice item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice items are no longer writable in the current invoice state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid invoice item payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/{invoiceId}/items/{itemId}:
    patch:
      operationId: UpdateInvoiceItemCommand
      tags: [Billing]
      summary: Update one invoice item
      description: Updates a draft invoice item and recalculates invoice totals in the same transaction.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
        - $ref: '#/components/parameters/InvoiceItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvoiceItemRequest'
      responses:
        '200':
          description: Invoice item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice or item not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice items are no longer writable in the current invoice state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid invoice item update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: RemoveInvoiceItemCommand
      tags: [Billing]
      summary: Delete one invoice item
      description: Deletes a draft invoice item and recalculates invoice totals in the same transaction.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
        - $ref: '#/components/parameters/InvoiceItemIdPath'
      responses:
        '200':
          description: Invoice item deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice or item not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice items are no longer writable in the current invoice state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/{invoiceId}:issue:
    post:
      operationId: IssueInvoiceCommand
      tags: [Billing]
      summary: Issue a draft invoice
      description: Marks a draft invoice as issued. The invoice must already have at least one item and a positive total.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      responses:
        '200':
          description: Invoice issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice cannot be issued in its current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/{invoiceId}:finalize:
    post:
      operationId: FinalizeInvoiceCommand
      tags: [Billing]
      summary: Finalize an issued invoice
      description: Marks an issued invoice as finalized and leaves it read-only except for voiding.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      responses:
        '200':
          description: Invoice finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice cannot be finalized in its current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/invoices/{invoiceId}:void:
    post:
      operationId: VoidInvoiceCommand
      tags: [Billing]
      summary: Void an invoice
      description: Voids a draft, issued, or finalized invoice. Void is terminal and requires a reason.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/InvoiceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoidInvoiceRequest'
      responses:
        '200':
          description: Invoice voided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or billing write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Invoice not found in tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invoice cannot be voided in its current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 255
    ServiceIdPath:
      name: serviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PriceListIdPath:
      name: priceListId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceIdPath:
      name: invoiceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvoiceItemIdPath:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BillingSearchQuery:
      name: q
      in: query
      required: false
      schema:
        type: string
        maxLength: 120
    InvoiceStatusFilter:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [draft, issued, finalized, void]
    InvoicePatientFilter:
      name: patient_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    InvoiceIssuedFromFilter:
      name: issued_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    InvoiceIssuedToFilter:
      name: issued_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    InvoiceDueFromFilter:
      name: due_from
      in: query
      required: false
      schema:
        type: string
        format: date
    InvoiceDueToFilter:
      name: due_to
      in: query
      required: false
      schema:
        type: string
        format: date
    InvoiceCreatedFromFilter:
      name: created_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    InvoiceCreatedToFilter:
      name: created_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    BillingServiceCategoryFilter:
      name: category
      in: query
      required: false
      schema:
        type: string
        maxLength: 120
    BillingActiveFilter:
      name: is_active
      in: query
      required: false
      schema:
        type: boolean
    BillingDefaultFilter:
      name: is_default
      in: query
      required: false
      schema:
        type: boolean
    PriceListActiveOnFilter:
      name: active_on
      in: query
      required: false
      schema:
        type: string
        format: date
    BillingLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    BillingExportLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 25
  schemas:
    BillableService:
      type: object
      required: [id, tenant_id, code, name, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        category:
          type: [string, 'null']
        unit:
          type: [string, 'null']
        description:
          type: [string, 'null']
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    BillableServiceCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BillableService'
        meta:
          type: object
          required: [filters]
          properties:
            filters:
              type: object
    BillableServiceMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
        data:
          $ref: '#/components/schemas/BillableService'
    CreateBillableServiceRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 255
        category:
          type: [string, 'null']
          maxLength: 120
        unit:
          type: [string, 'null']
          maxLength: 64
        description:
          type: [string, 'null']
        is_active:
          type: boolean
    UpdateBillableServiceRequest:
      type: object
      properties:
        code:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 255
        category:
          type: [string, 'null']
          maxLength: 120
        unit:
          type: [string, 'null']
          maxLength: 64
        description:
          type: [string, 'null']
        is_active:
          type: boolean
    PriceListItem:
      type: object
      required: [id, price_list_id, tenant_id, service, unit_price, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        price_list_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        service:
          type: object
          required: [id, code, name, is_active]
          properties:
            id:
              type: string
              format: uuid
            code:
              type: string
            name:
              type: string
            category:
              type: [string, 'null']
            unit:
              type: [string, 'null']
            is_active:
              type: boolean
        unit_price:
          $ref: '#/components/schemas/Money'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PriceList:
      type: object
      required: [id, tenant_id, code, name, currency, is_default, is_active, item_count, items, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: [string, 'null']
        currency:
          type: string
          minLength: 3
          maxLength: 3
        is_default:
          type: boolean
        is_active:
          type: boolean
        effective_from:
          type: [string, 'null']
          format: date
        effective_to:
          type: [string, 'null']
          format: date
        item_count:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/PriceListItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PriceListCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PriceList'
        meta:
          type: object
          required: [filters]
          properties:
            filters:
              type: object
    PriceListShowResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PriceList'
    PriceListMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
        data:
          $ref: '#/components/schemas/PriceList'
    CreatePriceListRequest:
      type: object
      required: [code, name, currency]
      properties:
        code:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 255
        description:
          type: [string, 'null']
        currency:
          type: string
          minLength: 3
          maxLength: 3
        is_default:
          type: boolean
        is_active:
          type: boolean
        effective_from:
          type: [string, 'null']
          format: date
        effective_to:
          type: [string, 'null']
          format: date
    UpdatePriceListRequest:
      type: object
      properties:
        code:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 255
        description:
          type: [string, 'null']
        currency:
          type: string
          minLength: 3
          maxLength: 3
        is_default:
          type: boolean
        is_active:
          type: boolean
        effective_from:
          type: [string, 'null']
          format: date
        effective_to:
          type: [string, 'null']
          format: date
    ReplacePriceListItemsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [service_id, amount]
            properties:
              service_id:
                type: string
                format: uuid
              amount:
                type: string
                pattern: '^\d{1,10}(\.\d{1,2})?$'
    InvoiceItem:
      type: object
      required: [id, invoice_id, tenant_id, service, quantity, unit_price, line_subtotal, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        service:
          type: object
          required: [id, code, name]
          properties:
            id:
              type: string
              format: uuid
            code:
              type: string
            name:
              type: string
            category:
              type: [string, 'null']
            unit:
              type: [string, 'null']
        description:
          type: [string, 'null']
        quantity:
          type: string
        unit_price:
          $ref: '#/components/schemas/Money'
        line_subtotal:
          $ref: '#/components/schemas/Money'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Invoice:
      type: object
      required: [id, tenant_id, invoice_number, patient, currency, invoice_date, status, item_count, totals, items, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        invoice_number:
          type: string
        patient:
          type: object
          required: [id, display_name]
          properties:
            id:
              type: string
              format: uuid
            display_name:
              type: string
        price_list:
          type:
            - object
            - 'null'
          properties:
            id:
              type: string
              format: uuid
            code:
              type: [string, 'null']
            name:
              type: [string, 'null']
        currency:
          type: string
          minLength: 3
          maxLength: 3
        invoice_date:
          type: string
          format: date
        due_on:
          type: [string, 'null']
          format: date
        notes:
          type: [string, 'null']
        status:
          type: string
          enum: [draft, issued, finalized, void]
        item_count:
          type: integer
        totals:
          type: object
          required: [subtotal, total]
          properties:
            subtotal:
              $ref: '#/components/schemas/Money'
            total:
              $ref: '#/components/schemas/Money'
        issued_at:
          type: [string, 'null']
          format: date-time
        finalized_at:
          type: [string, 'null']
          format: date-time
        voided_at:
          type: [string, 'null']
          format: date-time
        void_reason:
          type: [string, 'null']
        last_transition:
          type:
            - object
            - 'null'
        deleted_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceItem'
    InvoiceCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        meta:
          type: object
          required: [filters]
          properties:
            filters:
              type: object
    InvoiceShowResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Invoice'
    InvoiceMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
        data:
          $ref: '#/components/schemas/Invoice'
    InvoiceItemCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceItem'
    InvoiceExportResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
        data:
          type: object
          required: [export_id, format, file_name, row_count, generated_at, filters, storage]
          properties:
            export_id:
              type: string
              format: uuid
            format:
              type: string
              enum: [csv]
            file_name:
              type: string
            row_count:
              type: integer
            generated_at:
              type: string
              format: date-time
            filters:
              type: object
            storage:
              type: object
              required: [disk, path, visibility]
              properties:
                disk:
                  type: string
                path:
                  type: string
                visibility:
                  type: string
    CreateInvoiceRequest:
      type: object
      required: [patient_id]
      properties:
        patient_id:
          type: string
          format: uuid
        price_list_id:
          type: [string, 'null']
          format: uuid
        currency:
          type: [string, 'null']
          minLength: 3
          maxLength: 3
        invoice_date:
          type: [string, 'null']
          format: date
        due_on:
          type: [string, 'null']
          format: date
        notes:
          type: [string, 'null']
    UpdateInvoiceRequest:
      type: object
      properties:
        patient_id:
          type: string
          format: uuid
        price_list_id:
          type: [string, 'null']
          format: uuid
        currency:
          type: [string, 'null']
          minLength: 3
          maxLength: 3
        invoice_date:
          type: [string, 'null']
          format: date
        due_on:
          type: [string, 'null']
          format: date
        notes:
          type: [string, 'null']
    CreateInvoiceItemRequest:
      type: object
      required: [service_id, quantity]
      properties:
        service_id:
          type: string
          format: uuid
        description:
          type: [string, 'null']
        quantity:
          type: string
          pattern: '^\d{1,10}(\.\d{1,2})?$'
        unit_price_amount:
          type: [string, 'null']
          pattern: '^\d{1,10}(\.\d{1,2})?$'
    UpdateInvoiceItemRequest:
      type: object
      properties:
        service_id:
          type: string
          format: uuid
        description:
          type: [string, 'null']
        quantity:
          type: string
          pattern: '^\d{1,10}(\.\d{1,2})?$'
        unit_price_amount:
          type: [string, 'null']
          pattern: '^\d{1,10}(\.\d{1,2})?$'
    VoidInvoiceRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
    ApiErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
