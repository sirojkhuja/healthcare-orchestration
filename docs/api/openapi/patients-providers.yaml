components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PatientIdPath:
      name: patientId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderIdPath:
      name: providerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SpecialtyIdPath:
      name: specialtyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderLicenseIdPath:
      name: licenseId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AvailabilityRuleIdPath:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderTimeOffIdPath:
      name: timeOffId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderGroupIdPath:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PatientContactIdPath:
      name: contactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PatientConsentIdPath:
      name: consentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PatientDocumentIdPath:
      name: docId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PatientInsurancePolicyIdPath:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PatientExternalReferenceIdPath:
      name: refId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: true
      description: Active tenant scope for the request.
      schema:
        type: string
        format: uuid
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      description: Required idempotency token for scheduling mutations and cache rebuild operations.
      schema:
        type: string
        maxLength: 255
    AvailabilityDateFromQuery:
      name: date_from
      in: query
      required: true
      schema:
        type: string
        format: date
    AvailabilityDateToQuery:
      name: date_to
      in: query
      required: true
