openapi: 3.1.1
info:
  title: MedFlow Patients and Providers Fragment
  version: 0.1.0
paths:
  /api/v1/patients:
    get:
      operationId: ListPatientsQuery
      tags: [Patients]
      summary: List active patients in the current tenant
      description: Returns the active patient directory for the tenant resolved from `X-Tenant-Id`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Active patient directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreatePatientCommand
      tags: [Patients]
      summary: Create a patient master record
      description: Creates a tenant-owned patient master record in the active tenant scope.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
            examples:
              default:
                value:
                  first_name: Aziza
                  last_name: Karimova
                  middle_name: Anvarovna
                  preferred_name: Azi
                  sex: female
                  birth_date: '1990-05-01'
                  national_id: AA1234567
                  email: aziza@openai.com
                  phone: '+998901234567'
                  city_code: tashkent
                  district_code: mirzo-ulugbek
                  address_line_1: 12 Amir Temur Street
                  postal_code: '100000'
                  notes: Prefers morning visits.
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: National ID conflicts with another active patient in the tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid payload or invalid location combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/search:
    get:
      operationId: SearchPatientsQuery
      tags: [Patients]
      summary: Search active patients in the current tenant
      description: >
        Searches the active tenant-owned patient directory. Relevance prefers exact identifier matches,
        then prefix matches, then substring matches across patient names, `national_id`, `email`, and `phone`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/PatientSearchQuery'
        - $ref: '#/components/parameters/PatientSexFilter'
        - $ref: '#/components/parameters/PatientCityCodeFilter'
        - $ref: '#/components/parameters/PatientDistrictCodeFilter'
        - $ref: '#/components/parameters/PatientBirthDateFromFilter'
        - $ref: '#/components/parameters/PatientBirthDateToFilter'
        - $ref: '#/components/parameters/PatientCreatedFromFilter'
        - $ref: '#/components/parameters/PatientCreatedToFilter'
        - $ref: '#/components/parameters/PatientHasEmailFilter'
        - $ref: '#/components/parameters/PatientHasPhoneFilter'
        - $ref: '#/components/parameters/PatientSearchLimit'
      responses:
        '200':
          description: Matching active patients ordered by relevance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientSearchResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid search filter combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/export:
    get:
      operationId: ExportPatientsQuery
      tags: [Patients]
      summary: Export the active patient search result set
      description: >
        Generates a CSV snapshot of the active patient search result set, stores it on the private
        exports disk, and returns a private export reference.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/PatientSearchQuery'
        - $ref: '#/components/parameters/PatientSexFilter'
        - $ref: '#/components/parameters/PatientCityCodeFilter'
        - $ref: '#/components/parameters/PatientDistrictCodeFilter'
        - $ref: '#/components/parameters/PatientBirthDateFromFilter'
        - $ref: '#/components/parameters/PatientBirthDateToFilter'
        - $ref: '#/components/parameters/PatientCreatedFromFilter'
        - $ref: '#/components/parameters/PatientCreatedToFilter'
        - $ref: '#/components/parameters/PatientHasEmailFilter'
        - $ref: '#/components/parameters/PatientHasPhoneFilter'
        - $ref: '#/components/parameters/PatientExportLimit'
        - $ref: '#/components/parameters/PatientExportFormat'
      responses:
        '200':
          description: Export generated and persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientExportResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid export filter combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}:
    get:
      operationId: GetPatientQuery
      tags: [Patients]
      summary: Get one active patient in tenant scope
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: UpdatePatientCommand
      tags: [Patients]
      summary: Update a patient master record
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
            examples:
              default:
                value:
                  preferred_name: Dr. Azi
                  district_code: yunusabad
                  phone: null
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: National ID conflicts with another active patient in the tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid payload or invalid location combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeletePatientCommand
      tags: [Patients]
      summary: Soft delete a patient master record
      description: Soft deletes the patient so it no longer appears in active patient directory reads.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient soft deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/summary:
    get:
      operationId: GetPatientSummaryQuery
      tags: [Patients]
      summary: Get a derived patient summary
      description: Returns the active patient master record plus derived directory and audit summary fields.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientSummaryResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/timeline:
    get:
      operationId: GetPatientTimelineQuery
      tags: [Patients]
      summary: Get the patient audit timeline
      description: Returns immutable patient audit events newest first for the active patient in tenant scope.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/PatientTimelineLimit'
      responses:
        '200':
          description: Patient timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientTimelineResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid timeline limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/contacts:
    get:
      operationId: ListPatientContactsQuery
      tags: [Patients]
      summary: List patient contacts
      description: Returns tenant-scoped patient contacts ordered by primary flag, emergency flag, name, and creation time.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient contacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientContactCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreatePatientContactCommand
      tags: [Patients]
      summary: Create a patient contact
      description: Creates a tenant-scoped patient contact. At least one of `phone` or `email` is required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientContactRequest'
      responses:
        '201':
          description: Patient contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientContactMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid contact payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/contacts/{contactId}:
    patch:
      operationId: UpdatePatientContactCommand
      tags: [Patients]
      summary: Update a patient contact
      description: Updates a tenant-scoped patient contact while preserving the single-primary-contact invariant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/PatientContactIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientContactRequest'
      responses:
        '200':
          description: Patient contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientContactMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient or contact not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid contact payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeletePatientContactCommand
      tags: [Patients]
      summary: Delete a patient contact
      description: Hard deletes a tenant-scoped patient contact and records a patient audit event.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/PatientContactIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient contact deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientContactMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient or contact not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/tags:
    get:
      operationId: ListPatientTagsQuery
      tags: [Patients]
      summary: List normalized patient tags
      description: Returns the full active normalized tag set for the patient.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientTagsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: SetPatientTagsCommand
      tags: [Patients]
      summary: Replace the patient tag set
      description: >
        Replaces the entire patient tag set. Tags are trimmed, lowercased, deduplicated,
        empty values are discarded, and the response is alphabetically sorted.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPatientTagsRequest'
      responses:
        '200':
          description: Patient tags replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientTagsMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid tags payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/documents:
    get:
      operationId: ListPatientDocumentsQuery
      tags: [Patients]
      summary: List patient document metadata
      description: Returns patient document metadata newest first. Responses never include public file URLs or storage-internal paths.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDocumentCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: UploadPatientDocumentCommand
      tags: [Patients]
      summary: Upload a patient document
      description: >
        Uploads a patient document to the private attachments disk and returns metadata only.
        If `title` is omitted it defaults to the uploaded filename.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadPatientDocumentRequest'
      responses:
        '201':
          description: Patient document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDocumentMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid document upload payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/documents/{docId}:
    get:
      operationId: GetPatientDocumentQuery
      tags: [Patients]
      summary: Get patient document metadata
      description: Returns document metadata only for one patient document in tenant scope.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/PatientDocumentIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDocumentResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient or document not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeletePatientDocumentCommand
      tags: [Patients]
      summary: Delete a patient document
      description: Deletes patient document metadata and performs best-effort deletion of the private attachment file.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/PatientDocumentIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientDocumentMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient or document not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/patients/{patientId}/consents:
    get:
      operationId: ListPatientConsentsQuery
      tags: [Patients]
      summary: List patient consents
      description: Returns patient consent history with active consents first, then by grant time descending.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Patient consents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientConsentCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Patient not found in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreatePatientConsentCommand
      tags: [Patients]
      summary: Create a patient consent
      description: Creates a tenant-scoped patient consent. At most one active consent of the same type may exist per patient.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PatientIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientConsentRequest'
      responses:
        '201':
          description: Patient consent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientConsentMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or patient write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
