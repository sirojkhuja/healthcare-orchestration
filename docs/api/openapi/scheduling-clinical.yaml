openapi: 3.1.1
info:
  title: MedFlow Scheduling and Clinical Fragment
  version: 0.1.0
paths:
  /api/v1/appointments:
    get:
      operationId: ListAppointmentsQuery
      tags: [Appointments]
      summary: List active appointments in the current tenant
      description: Returns active tenant-scoped appointments ordered by scheduled start time.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Appointment directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentCollectionResponse'
              examples:
                default:
                  value:
                    data:
                      - id: 6b565215-58f5-45b2-a89d-292c489b21c1
                        tenant_id: 50234272-f1a8-40e8-a548-3a3b60230936
                        status: draft
                        patient:
                          id: 2c9fcd89-f6c6-49bf-a22c-476b32e9be6e
                          display_name: Aziza Karimova
                        provider:
                          id: 0cf87d48-8892-4d43-8d50-7b1046adc80f
                          display_name: Kamola Rasulova
                        clinic: null
                        room: null
                        scheduled_slot:
                          start_at: '2026-03-13T04:00:00+00:00'
                          end_at: '2026-03-13T04:30:00+00:00'
                          timezone: Asia/Tashkent
                        last_transition: null
                        deleted_at: null
                        created_at: '2026-03-10T08:00:00+00:00'
                        updated_at: '2026-03-10T08:00:00+00:00'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreateAppointmentCommand
      tags: [Appointments]
      summary: Create a draft appointment
      description: Creates a tenant-owned appointment in draft status.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
            examples:
              default:
                value:
                  patient_id: 2c9fcd89-f6c6-49bf-a22c-476b32e9be6e
                  provider_id: 0cf87d48-8892-4d43-8d50-7b1046adc80f
                  clinic_id: 52ccdb45-a06d-47dd-a2ea-e39126402f61
                  room_id: 68116f2b-c8e6-44c9-8941-ff995f301db1
                  scheduled_start_at: '2026-03-13T09:00:00+05:00'
                  scheduled_end_at: '2026-03-13T09:30:00+05:00'
                  timezone: Asia/Tashkent
      responses:
        '201':
          description: Draft appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid payload or cross-reference mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/appointments/search:
    get:
      operationId: SearchAppointmentsQuery
      tags: [Appointments]
      summary: Search active appointments in tenant scope
      description: Searches appointment IDs plus patient and provider display names with structured tenant-scoped filters.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/AppointmentSearchQuery'
        - $ref: '#/components/parameters/AppointmentStatusFilter'
        - $ref: '#/components/parameters/AppointmentPatientFilter'
        - $ref: '#/components/parameters/AppointmentProviderFilter'
        - $ref: '#/components/parameters/AppointmentClinicFilter'
        - $ref: '#/components/parameters/AppointmentRoomFilter'
        - $ref: '#/components/parameters/AppointmentScheduledFromFilter'
        - $ref: '#/components/parameters/AppointmentScheduledToFilter'
        - $ref: '#/components/parameters/AppointmentCreatedFromFilter'
        - $ref: '#/components/parameters/AppointmentCreatedToFilter'
        - $ref: '#/components/parameters/AppointmentSearchLimit'
      responses:
        '200':
          description: Matching appointments ordered by relevance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentSearchResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid search filter combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/appointments/export:
    get:
      operationId: ExportAppointmentsQuery
      tags: [Appointments]
      summary: Export the active appointment search result set
      description: Generates a CSV snapshot of the active appointment search result set and stores it on the private exports disk.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/AppointmentSearchQuery'
        - $ref: '#/components/parameters/AppointmentStatusFilter'
        - $ref: '#/components/parameters/AppointmentPatientFilter'
        - $ref: '#/components/parameters/AppointmentProviderFilter'
        - $ref: '#/components/parameters/AppointmentClinicFilter'
        - $ref: '#/components/parameters/AppointmentRoomFilter'
        - $ref: '#/components/parameters/AppointmentScheduledFromFilter'
        - $ref: '#/components/parameters/AppointmentScheduledToFilter'
        - $ref: '#/components/parameters/AppointmentCreatedFromFilter'
        - $ref: '#/components/parameters/AppointmentCreatedToFilter'
        - $ref: '#/components/parameters/AppointmentExportLimit'
        - $ref: '#/components/parameters/AppointmentExportFormat'
      responses:
        '200':
          description: Export generated and persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentExportResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid export filter combination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/appointments/bulk:
    post:
      operationId: BulkUpdateAppointmentsCommand
      tags: [Appointments]
      summary: Apply one shared change set to multiple draft appointments
      description: Updates only active draft appointments in the current tenant. The request is all-or-nothing and requires an idempotency key.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkUpdateAppointmentsRequest'
            examples:
              default:
                value:
                  appointment_ids:
                    - 6b565215-58f5-45b2-a89d-292c489b21c1
                    - 0bf4ae31-f5d4-406d-88a5-84bde8209a5f
                  changes:
                    timezone: UTC
      responses:
        '200':
          description: Draft appointments updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAppointmentUpdateResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: One or more appointments do not exist in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: One or more selected appointments are not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid payload or unsupported change set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/appointments:bulk-cancel:
    post:
      operationId: BulkCancelAppointmentsCommand
      tags: [Appointments]
      summary: Cancel multiple scheduled or confirmed appointments
      description: Cancels `1..100` active tenant-scoped appointments in one all-or-nothing workflow mutation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCancelAppointmentsRequest'
      responses:
        '200':
          description: Appointments canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAppointmentTransitionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: One or more appointments do not exist in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: One or more selected appointments cannot be canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/appointments:bulk-reschedule:
    post:
      operationId: BulkRescheduleAppointmentsCommand
      tags: [Appointments]
      summary: Reschedule multiple scheduled or confirmed appointments
      description: Reschedules `1..100` active tenant-scoped appointments in one all-or-nothing workflow mutation and returns both source and replacement appointments.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkRescheduleAppointmentsRequest'
      responses:
        '200':
          description: Appointments rescheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAppointmentTransitionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or appointment write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: One or more appointments do not exist in the active tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: One or more selected appointments cannot be rescheduled or a replacement slot is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
