            schema:
              $ref: '#/components/schemas/ProcessLabWebhookRequest'
            examples:
              completedDelivery:
                value:
                  delivery_id: delivery-001
                  external_order_id: remote-order-001
                  status: completed
                  occurred_at: '2026-03-11T09:15:00+05:00'
                  results:
                    - external_result_id: result-001
                      status: final
                      observed_at: '2026-03-11T09:00:00+05:00'
                      received_at: '2026-03-11T09:10:00+05:00'
                      value_type: numeric
                      value_numeric: '5.2'
                      unit: 10^9/L
                      reference_range: 4.0-11.0
                      abnormal_flag: normal
      responses:
        '200':
          description: Delivery processed or safely deduplicated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabWebhookProcessResultResponse'
        '401':
          description: Signature verification failed
          content:
