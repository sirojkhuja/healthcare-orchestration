    post:
      operationId: ReceiveLabResultWebhookCommand
      tags: [Labs]
      summary: Accept one signed inbound lab webhook delivery
      description: Public integration route for provider delivery intake. The webhook is idempotent on provider plus delivery ID and requires signature verification before any state change.
      parameters:
        - $ref: '#/components/parameters/LabProviderPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/LabSignatureHeader'
      requestBody:
        required: true
