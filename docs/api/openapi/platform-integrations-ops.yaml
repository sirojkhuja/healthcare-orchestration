        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '200':
          description: Runtime config projection refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or admin write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
