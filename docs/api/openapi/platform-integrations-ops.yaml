            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: UpdateRateLimitsCommand
      tags: [Ops]
      summary: Update tenant rate-limit bucket overrides
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRateLimitsRequest'
      responses:
        '200':
          description: Rate limits updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or admin write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Unsupported rate-limit bucket or invalid values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/admin/config:
    get:
      operationId: GetRuntimeConfigQuery
      tags: [Ops]
      summary: Get the safe runtime config projection
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Safe runtime config projection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or admin read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/admin/config:reload:
    post:
      operationId: ReloadRuntimeConfigCommand
      tags: [Ops]
      summary: Refresh the safe runtime config projection
      security:
        - bearerAuth: []
      parameters:
