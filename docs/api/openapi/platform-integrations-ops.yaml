          properties:
            key:
              type: [string, 'null']
            message_id:
              type: [string, 'null']
        failure:
          type:
            - object
            - 'null'
          properties:
            code:
              type: [string, 'null']
            message:
              type: [string, 'null']
        queued_at:
          type: string
          format: date-time
        sent_at:
          type: [string, 'null']
          format: date-time
        failed_at:
          type: [string, 'null']
          format: date-time
        canceled_at:
          type: [string, 'null']
          format: date-time
        canceled_reason:
