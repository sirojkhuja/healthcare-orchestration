openapi: 3.1.1
info:
  title: MedFlow Platform, Notifications, Integrations, and Ops Fragment
  version: 0.1.0
paths:
  /api/v1/templates:
    get:
      operationId: ListTemplatesQuery
      tags: [Notifications]
      summary: List notification templates in the current tenant
      description: Returns tenant-scoped notification templates filtered by free-text, channel, and activity state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TemplateSearchQuery'
        - $ref: '#/components/parameters/TemplateChannelFilter'
        - $ref: '#/components/parameters/TemplateActiveFilter'
        - $ref: '#/components/parameters/TemplateLimit'
      responses:
        '200':
          description: Template directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreateTemplateCommand
      tags: [Notifications]
      summary: Create a notification template
      description: Creates a tenant-scoped notification template and initializes immutable version `1`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationTemplateRequest'
            example:
              code: appointment-reminder
              name: Appointment reminder
              channel: email
              description: Reminder before the visit.
              subject_template: Reminder for {{patient.first_name}}
              body_template: |-
                Hello {{patient.first_name}},

                Your visit at {{clinic.name}} starts at {{appointment.start_at}}.
      responses:
        '201':
          description: Notification template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid, duplicate, or channel-incompatible template payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/templates/{templateId}:
    get:
      operationId: GetTemplateQuery
      tags: [Notifications]
      summary: Get one notification template and its version history
      description: Returns the current template projection plus immutable versions in descending version order.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TemplateIdPath'
      responses:
        '200':
          description: Notification template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateDetailsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Template not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: UpdateTemplateCommand
      tags: [Notifications]
      summary: Update a notification template
      description: Applies a partial update to the current template projection and creates a new immutable version when content changes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationTemplateRequest'
            example:
              body_template: |-
                Hello {{patient.first_name}},

                Your visit at {{clinic.name}} with {{provider.name}} starts at {{appointment.start_at}}.
              is_active: false
      responses:
        '200':
          description: Notification template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Template not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid, duplicate, or channel-incompatible update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeleteTemplateCommand
      tags: [Notifications]
      summary: Delete a notification template
      description: Soft-deletes the current template projection and keeps immutable version history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/TemplateIdPath'
      responses:
        '200':
          description: Notification template deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationTemplateMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Template not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/templates/{templateId}:test-render:
    post:
      operationId: TestRenderTemplateCommand
      tags: [Notifications]
      summary: Render a notification template with sample variables
      description: Renders the current template projection using strict `{{path.to.value}}` placeholders and a caller-provided `variables` object.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestRenderNotificationTemplateRequest'
            example:
              variables:
                patient:
                  first_name: Amina
                clinic:
                  name: Downtown Clinic
                appointment:
                  start_at: 2026-03-12 09:00
      responses:
        '200':
          description: Rendered notification template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderedNotificationTemplateResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Template not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Missing placeholder data or non scalar render value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications:
    get:
      operationId: ListNotificationsQuery
      tags: [Notifications]
      summary: List queued and delivered notifications in the current tenant
      description: Returns tenant-scoped notification records filtered by free-text, lifecycle status, channel, template, and creation window.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/NotificationSearchQuery'
        - $ref: '#/components/parameters/NotificationStatusFilter'
        - $ref: '#/components/parameters/NotificationChannelFilter'
        - $ref: '#/components/parameters/NotificationTemplateIdFilter'
        - $ref: '#/components/parameters/NotificationCreatedFrom'
        - $ref: '#/components/parameters/NotificationCreatedTo'
        - $ref: '#/components/parameters/NotificationLimit'
      responses:
        '200':
          description: Notification directory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: SendNotificationCommand
      tags: [Notifications]
      summary: Queue a rendered notification for delivery
      description: Renders the active template in the current tenant, snapshots the rendered content, and stores a notification record in `queued`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNotificationRequest'
            example:
              template_id: 5a11fa9c-9ec9-4f56-9fa4-22ac7544c6cb
              recipient:
                email: amina@example.com
                name: Amina Karimova
              variables:
                patient:
                  first_name: Amina
                appointment:
                  start_at: 2026-03-12 09:00
              metadata:
                object_type: appointment
                object_id: APT-123
      responses:
        '201':
          description: Notification queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Template not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid recipient, inactive template, or invalid render payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications/{notificationId}:
    get:
      operationId: GetNotificationQuery
      tags: [Notifications]
      summary: Get one notification record
      description: Returns the stored notification snapshot and lifecycle state in the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/NotificationIdPath'
      responses:
        '200':
          description: Notification details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDetailsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Notification not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications/{notificationId}:retry:
    post:
      operationId: RetryNotificationCommand
      tags: [Notifications]
      summary: Retry a failed notification
      description: Returns a failed notification to `queued` when retry budget remains.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/NotificationIdPath'
      responses:
        '200':
          description: Notification re-queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Notification not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Notification is not retryable or retry budget is exhausted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications/{notificationId}:cancel:
    post:
      operationId: CancelNotificationCommand
      tags: [Notifications]
      summary: Cancel a queued or failed notification
      description: Stops future delivery attempts for a queued or failed notification and records an optional cancel reason.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/NotificationIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelNotificationRequest'
            example:
              reason: Reminder no longer needed.
      responses:
        '200':
          description: Notification canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Notification not found in the current tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Notification is not cancelable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications:test/sms:
    post:
      operationId: SendTestSmsCommand
      tags: [Notifications]
      summary: Send a diagnostic SMS through tenant routing and failover
      description: Validates the SMS payload, resolves the tenant-specific route for the selected message type, attempts providers in order, and returns the ordered attempt list without creating a notification row.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSmsRequest'
            example:
              recipient:
                phone_number: '+998901234567'
              message: Reminder for your visit.
              message_type: reminder
      responses:
        '200':
          description: Diagnostic SMS result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsDiagnosticSendResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid recipient, message type, or routing payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications:test/email:
    post:
      operationId: SendTestEmailCommand
      tags: [Notifications]
      summary: Send a diagnostic email through the configured tenant sender
      description: Validates the email payload, uses the tenant email provider settings, and sends directly through the configured adapter without creating notification or email-event rows.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
            example:
              recipient:
                email: patient.email+test@openai.com
                name: Amina Karimova
              subject: Diagnostic subject
              body: Diagnostic body
      responses:
        '200':
          description: Diagnostic email result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailDiagnosticSendResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Email provider is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid email recipient or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notifications:test/telegram:
    post:
      operationId: SendTestTelegramCommand
      tags: [Notifications]
      summary: Send a diagnostic Telegram message
      description: Validates the Telegram payload, uses the tenant Telegram provider settings, and sends directly through the configured bot without creating a notification row.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendTelegramRequest'
            example:
              recipient:
                chat_id: '3001'
              message: Test telegram message
              metadata:
                parse_mode: HTML
      responses:
        '200':
          description: Diagnostic Telegram result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramDiagnosticSendResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Telegram provider is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid Telegram recipient or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notification-providers/email:
    get:
      operationId: GetEmailProviderQuery
      tags: [Notifications]
      summary: Get tenant email provider settings
      description: Returns the tenant email sender settings used for direct and queued transactional email delivery.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Email provider settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailProviderSettingsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: SetEmailProviderCommand
      tags: [Notifications]
      summary: Replace tenant email provider settings
      description: Replaces the tenant email sender configuration. Transport credentials remain application-configured until the integrations hub task.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailProviderSettingsRequest'
            example:
              enabled: true
              from_address: noreply@openai.com
              from_name: MedFlow Notifications
              reply_to_address: support@openai.com
              reply_to_name: MedFlow Support
      responses:
        '200':
          description: Email provider settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailProviderSettingsMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid sender or reply-to payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notification-providers/sms:
    get:
      operationId: ListSmsProvidersQuery
      tags: [Notifications]
      summary: Get effective tenant SMS routing priorities
      description: Returns configured SMS providers and the effective ordered provider list for each SMS message type.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: SMS routing settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsRoutingSettingsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: SetSmsProvidersPriorityCommand
      tags: [Notifications]
      summary: Upsert tenant SMS routing priorities
      description: Stores partial tenant-specific SMS provider ordering by message type and returns the effective route set after the update.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSmsRoutingSettingsRequest'
            example:
              routes:
                - message_type: reminder
                  providers: [playmobile, eskiz]
                - message_type: transactional
                  providers: [eskiz]
      responses:
        '200':
          description: SMS routing settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsRoutingSettingsMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid message type or provider order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/notification-providers/telegram:
    get:
      operationId: GetTelegramProviderQuery
      tags: [Notifications]
      summary: Get tenant Telegram provider settings
      description: Returns the tenant Telegram delivery settings and the most recent bot sync snapshot.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Telegram provider settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramProviderSettingsResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: SetTelegramProviderCommand
      tags: [Notifications]
      summary: Replace tenant Telegram provider settings
      description: Replaces the tenant Telegram settings, including enabled state, parse mode, and the configured broadcast and support chat sets.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTelegramProviderSettingsRequest'
            example:
              enabled: true
              parse_mode: MarkdownV2
              broadcast_chat_ids: ['1001', '1002']
              support_chat_ids: ['2001']
      responses:
        '200':
          description: Telegram provider settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramProviderSettingsMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or notification write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid parse mode or chat assignment
          content:
            application/json:
