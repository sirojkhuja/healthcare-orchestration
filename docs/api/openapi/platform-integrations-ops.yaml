      required: false
      schema:
        type: string
        format: uuid
    NotificationCreatedFrom:
      in: query
      name: created_from
      required: false
      schema:
        type: string
        format: date
    NotificationCreatedTo:
      in: query
      name: created_to
      required: false
      schema:
        type: string
        format: date
    NotificationLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    EmailEventSearchQuery:
      in: query
