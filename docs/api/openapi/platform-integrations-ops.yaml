                $ref: '#/components/schemas/IntegrationWebhookMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or integrations write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Unknown integration or webhook id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Secret rotation is not supported for this integration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/{integrationKey}/tokens:
    get:
      operationId: ListIntegrationTokensQuery
      tags: [Integrations]
      summary: List managed token inventory for one integration
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IntegrationKeyPath'
      responses:
        '200':
          description: Managed token inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationTokensResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or integrations read permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Unknown integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/{integrationKey}/tokens:refresh:
    post:
      operationId: RefreshIntegrationTokensCommand
      tags: [Integrations]
      summary: Refresh one integration token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/IntegrationKeyPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshIntegrationTokensRequest'
      responses:
        '200':
          description: Managed token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationTokenMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or integrations write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Unknown integration key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: No refreshable token exists or token refresh is unsupported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/{integrationKey}/tokens/{tokenId}:
    delete:
      operationId: RevokeIntegrationTokenCommand
      tags: [Integrations]
      summary: Revoke one managed integration token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - $ref: '#/components/parameters/IntegrationKeyPath'
        - $ref: '#/components/parameters/TokenIdPath'
      responses:
        '200':
          description: Managed token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationTokenMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or integrations write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Unknown integration or token id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/myid:verify:
    post:
      operationId: VerifyMyIdCommand
      tags: [Integrations]
      summary: Create one tenant-scoped MyID verification session
      description: Creates a local-first `pending` MyID verification session after the tenant integration is enabled, credentialed, and has an active secret-managed webhook.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyIdVerificationCreateRequest'
      responses:
        '201':
          description: MyID verification session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyIdVerificationMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or integrations write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Feature flag is off or tenant readiness requirements are not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid verification payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/webhooks/myid:
    post:
      operationId: HandleMyIdWebhookCommand
      tags: [Integrations]
      summary: Process one MyID webhook delivery
      description: Verifies the managed webhook secret, resolves tenant scope from the webhook inventory, deduplicates `delivery_id` replays, and transitions one pending verification session to a terminal state.
      parameters:
        - $ref: '#/components/parameters/IntegrationWebhookSecretHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyIdWebhookRequest'
      responses:
        '200':
          description: Webhook accepted or replay ignored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalIntegrationWebhookResponse'
        '401':
          description: Missing or invalid integration webhook secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Unknown webhook or provider reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/integrations/eimzo:sign:
    post:
      operationId: CreateEImzoSignRequestCommand
      tags: [Integrations]
      summary: Create one tenant-scoped E-IMZO sign request
      description: Creates a local-first `pending` E-IMZO sign request after the tenant integration is enabled, credentialed, and has an active secret-managed webhook.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EImzoSignRequestCreateRequest'
      responses:
        '201':
          description: E-IMZO sign request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EImzoSignRequestMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing tenant scope or integrations write permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Feature flag is off or tenant readiness requirements are not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid sign request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/webhooks/eimzo:
    post:
      operationId: HandleEImzoWebhookCommand
      tags: [Integrations]
      summary: Process one E-IMZO webhook delivery
      description: Verifies the managed webhook secret, resolves tenant scope from the webhook inventory, deduplicates `delivery_id` replays, and transitions one pending sign request to a terminal state.
      parameters:
        - $ref: '#/components/parameters/IntegrationWebhookSecretHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EImzoWebhookRequest'
      responses:
        '200':
          description: Webhook accepted or replay ignored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalIntegrationWebhookResponse'
        '401':
          description: Missing or invalid integration webhook secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Unknown webhook or provider reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid webhook payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantIdHeader:
      in: header
      name: X-Tenant-Id
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
        maxLength: 255
    TemplateIdPath:
      in: path
      name: templateId
      required: true
      schema:
        type: string
        format: uuid
    NotificationIdPath:
      in: path
      name: notificationId
      required: true
      schema:
        type: string
        format: uuid
    TemplateSearchQuery:
      in: query
      name: q
      required: false
      schema:
        type: string
        maxLength: 120
    NotificationSearchQuery:
      in: query
      name: q
      required: false
      schema:
        type: string
        maxLength: 120
    TemplateChannelFilter:
      in: query
      name: channel
      required: false
      schema:
        type: string
        enum: [email, sms, telegram]
    NotificationChannelFilter:
      in: query
      name: channel
      required: false
      schema:
        type: string
        enum: [email, sms, telegram]
    TemplateActiveFilter:
      in: query
      name: is_active
      required: false
      schema:
        type: boolean
    TemplateLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    NotificationStatusFilter:
      in: query
      name: status
      required: false
      schema:
        type: string
        enum: [queued, sent, failed, canceled]
    NotificationTemplateIdFilter:
      in: query
      name: template_id
      required: false
      schema:
        type: string
        format: uuid
    NotificationCreatedFrom:
      in: query
      name: created_from
      required: false
      schema:
        type: string
        format: date
    NotificationCreatedTo:
      in: query
      name: created_to
      required: false
      schema:
        type: string
        format: date
    NotificationLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    EmailEventSearchQuery:
      in: query
      name: q
      required: false
      schema:
        type: string
        maxLength: 120
    EmailEventSourceFilter:
      in: query
      name: source
      required: false
      schema:
        type: string
        enum: [notification, direct]
    EmailEventTypeFilter:
      in: query
      name: event_type
      required: false
      schema:
        type: string
        enum: [sent, failed]
    EmailEventNotificationIdFilter:
      in: query
      name: notification_id
      required: false
      schema:
        type: string
        format: uuid
    EmailEventCreatedFrom:
      in: query
      name: created_from
      required: false
      schema:
        type: string
        format: date
    EmailEventCreatedTo:
      in: query
      name: created_to
      required: false
      schema:
        type: string
        format: date
    EmailEventLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    IntegrationKeyPath:
      in: path
      name: integrationKey
      required: true
      schema:
        type: string
        maxLength: 64
    WebhookIdPath:
      in: path
      name: webhookId
      required: true
      schema:
        type: string
        format: uuid
    TokenIdPath:
      in: path
      name: tokenId
      required: true
      schema:
        type: string
        format: uuid
    IntegrationWebhookSecretHeader:
      in: header
      name: X-Integration-Webhook-Secret
      required: true
      schema:
        type: string
        maxLength: 255
    IntegrationCategoryFilter:
      in: query
      name: category
      required: false
      schema:
        type: string
        enum: [notifications, sms, payments, labs, identity]
    IntegrationEnabledFilter:
      in: query
      name: enabled
      required: false
      schema:
        type: boolean
    IntegrationLogLevelFilter:
      in: query
      name: level
      required: false
      schema:
        type: string
        enum: [info, warning, error]
    IntegrationLogEventFilter:
      in: query
      name: event
      required: false
      schema:
        type: string
        maxLength: 120
    IntegrationLogLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
  schemas:
    ApiErrorResponse:
      type: object
      required: [code, message, details, trace_id, correlation_id]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
        correlation_id:
          type: string
    NotificationTemplate:
      type: object
      required:
        - id
        - tenant_id
        - code
        - name
        - channel
        - is_active
        - current_version
        - body_template
        - placeholders
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        channel:
          type: string
          enum: [email, sms, telegram]
        description:
          type: [string, 'null']
        is_active:
          type: boolean
        current_version:
          type: integer
          minimum: 1
        subject_template:
          type: [string, 'null']
        body_template:
          type: string
        placeholders:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: [string, 'null']
          format: date-time
    NotificationTemplateVersion:
      type: object
      required:
        - version
        - code
        - name
        - channel
        - is_active
        - body_template
        - placeholders
        - created_at
        - updated_at
      properties:
        version:
          type: integer
          minimum: 1
        code:
          type: string
        name:
          type: string
        channel:
          type: string
          enum: [email, sms, telegram]
        description:
          type: [string, 'null']
        is_active:
          type: boolean
        subject_template:
          type: [string, 'null']
        body_template:
          type: string
        placeholders:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NotificationTemplateCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NotificationTemplate'
        meta:
          type: object
          required: [filters]
          properties:
            filters:
              type: object
              additionalProperties: true
    NotificationTemplateMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum:
            - notification_template_created
            - notification_template_updated
            - notification_template_deleted
        data:
          $ref: '#/components/schemas/NotificationTemplate'
    NotificationTemplateDetailsResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/NotificationTemplate'
            - type: object
              required: [versions]
              properties:
                versions:
                  type: array
                  items:
                    $ref: '#/components/schemas/NotificationTemplateVersion'
    CreateNotificationTemplateRequest:
      type: object
      required: [code, name, channel, body_template]
      properties:
        code:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 255
        channel:
          type: string
          enum: [email, sms, telegram]
        description:
          type: [string, 'null']
          maxLength: 5000
        is_active:
          type: boolean
        subject_template:
          type: [string, 'null']
          maxLength: 5000
        body_template:
          type: string
          maxLength: 50000
    UpdateNotificationTemplateRequest:
      type: object
      minProperties: 1
      properties:
        code:
          type: string
          maxLength: 120
        name:
          type: string
          maxLength: 255
        channel:
          type: string
          enum: [email, sms, telegram]
        description:
          type: [string, 'null']
          maxLength: 5000
        is_active:
          type: boolean
        subject_template:
          type: [string, 'null']
          maxLength: 5000
        body_template:
          type: string
          maxLength: 50000
    TestRenderNotificationTemplateRequest:
      type: object
      required: [variables]
      properties:
        variables:
          type: object
          additionalProperties: true
    RenderedNotificationTemplateResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [notification_template_rendered]
        data:
          type: object
          required:
            - template_id
            - code
            - channel
            - current_version
            - placeholders
            - variables
            - rendered_body
            - rendered_at
          properties:
            template_id:
              type: string
              format: uuid
            code:
              type: string
            channel:
              type: string
              enum: [email, sms, telegram]
            current_version:
              type: integer
              minimum: 1
            placeholders:
              type: array
              items:
                type: string
            variables:
              type: object
              additionalProperties: true
            rendered_subject:
              type: [string, 'null']
            rendered_body:
              type: string
            rendered_at:
              type: string
              format: date-time
    Notification:
      type: object
      required:
        - id
        - tenant_id
        - template
        - recipient
        - recipient_value
        - rendered_body
        - variables
        - metadata
        - status
        - attempts
        - queued_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        template:
          type: object
          required: [id, code, version, channel]
          properties:
            id:
              type: string
              format: uuid
            code:
              type: string
            version:
              type: integer
              minimum: 1
            channel:
              type: string
              enum: [email, sms, telegram]
        recipient:
          type: object
          additionalProperties: true
        recipient_value:
          type: string
        rendered_subject:
          type: [string, 'null']
        rendered_body:
          type: string
        variables:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [queued, sent, failed, canceled]
        attempts:
          type: object
          required: [used, max, remaining]
          properties:
            used:
              type: integer
              minimum: 0
            max:
              type: integer
              minimum: 1
            remaining:
              type: integer
              minimum: 0
        provider:
          type:
            - object
            - 'null'
          properties:
            key:
              type: [string, 'null']
            message_id:
              type: [string, 'null']
        failure:
          type:
            - object
            - 'null'
          properties:
            code:
              type: [string, 'null']
            message:
              type: [string, 'null']
        queued_at:
          type: string
          format: date-time
        sent_at:
          type: [string, 'null']
          format: date-time
        failed_at:
          type: [string, 'null']
          format: date-time
        canceled_at:
          type: [string, 'null']
          format: date-time
        canceled_reason:
          type: [string, 'null']
        last_attempt_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    NotificationCollectionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          type: object
          required: [filters]
          properties:
            filters:
              type: object
              additionalProperties: true
    NotificationMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [notification_queued, notification_retried, notification_canceled]
        data:
          $ref: '#/components/schemas/Notification'
    NotificationDetailsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Notification'
    SendNotificationRequest:
      type: object
      required: [template_id, recipient, variables]
      properties:
        template_id:
          type: string
          format: uuid
        recipient:
          type: object
          additionalProperties: true
        variables:
          type: object
          additionalProperties: true
        metadata:
          type:
            - object
            - 'null'
          additionalProperties: true
    CancelNotificationRequest:
      type: object
      properties:
        reason:
          type: [string, 'null']
          maxLength: 5000
    SmsProviderInfo:
      type: object
      required: [key, name]
      properties:
        key:
          type: string
        name:
          type: string
    SmsRoutingRule:
      type: object
      required: [message_type, providers, source]
      properties:
        message_type:
          type: string
          enum: [otp, reminder, transactional, bulk]
        providers:
          type: array
          minItems: 1
          items:
            type: string
        source:
          type: string
          enum: [default, custom]
    SmsRoutingSettings:
      type: object
      required: [providers, routes]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/SmsProviderInfo'
        routes:
          type: array
          items:
            $ref: '#/components/schemas/SmsRoutingRule'
    SmsRoutingSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/SmsRoutingSettings'
    SmsRoutingSettingsMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [sms_providers_updated]
        data:
          $ref: '#/components/schemas/SmsRoutingSettings'
    EmailProviderSettings:
      type: object
      required:
        [tenant_id, enabled, provider_key, from_address, from_name, reply_to_address, reply_to_name, created_at, updated_at]
      properties:
        tenant_id:
          type: string
          format: uuid
        enabled:
          type: boolean
        provider_key:
          type: string
          enum: [email]
        from_address:
          type: string
          format: email
        from_name:
          type: string
        reply_to_address:
          type: [string, 'null']
          format: email
        reply_to_name:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    EmailProviderSettingsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/EmailProviderSettings'
    EmailProviderSettingsMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [email_provider_updated]
        data:
          $ref: '#/components/schemas/EmailProviderSettings'
