      operationId: ListDepartmentsQuery
      tags: [Clinics]
      summary: List departments for a clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
