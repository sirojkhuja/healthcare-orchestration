openapi: 3.1.1
info:
  title: MedFlow Tenancy and Clinics Fragment
  version: 0.1.0
paths:
  /api/v1/tenants:
    get:
      operationId: ListTenantsQuery
      tags: [Tenancy]
      summary: List tenants visible to the authenticated actor
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
          example: acme
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended]
      responses:
        '200':
          description: Tenant memberships visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantCollectionResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreateTenantCommand
      tags: [Tenancy]
      summary: Bootstrap a new tenant for the authenticated actor
      description: Creates the tenant, default settings, default limits, an active creator membership, and a bootstrap Tenant Administrator role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
            examples:
              default:
                value:
                  name: Acme Health
                  contact_email: ops@acme.test
                  contact_phone: '+998901112233'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMutationResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/tenants/{tenantId}:
    get:
      operationId: GetTenantQuery
      tags: [Tenancy]
      summary: Get one tenant inside tenant scope
      description: The `{tenantId}` route parameter is the documented tenant context source. If `X-Tenant-Id` is also sent, it must match.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Tenant not visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: UpdateTenantCommand
      tags: [Tenancy]
      summary: Update tenant registry fields
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
            examples:
              rename:
                value:
                  name: Acme Health Updated
                  contact_phone: '+998907770011'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMutationResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Tenant not visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeleteTenantCommand
      tags: [Tenancy]
      summary: Delete a suspended tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMutationResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Tenant not visible to the actor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Tenant is not suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/tenants/{tenantId}:activate:
    post:
      operationId: ActivateTenantCommand
      tags: [Tenancy]
      summary: Activate a suspended tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMutationResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invalid tenant lifecycle transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/tenants/{tenantId}:suspend:
    post:
      operationId: SuspendTenantCommand
      tags: [Tenancy]
      summary: Suspend an active tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantMutationResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Invalid tenant lifecycle transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/tenants/{tenantId}/usage:
    get:
      operationId: GetTenantUsageQuery
      tags: [Tenancy]
      summary: Get the tenant usage snapshot
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantUsageResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/tenants/{tenantId}/limits:
    get:
      operationId: GetTenantLimitsQuery
      tags: [Tenancy]
      summary: Get tenant limits
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantLimitsResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: UpdateTenantLimitsCommand
      tags: [Tenancy]
      summary: Replace tenant limits
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantLimitsRequest'
            examples:
              default:
                value:
                  users: 25
                  clinics: 4
                  providers: 80
                  patients: 1000
                  storage_gb: 150
                  monthly_notifications: 10000
      responses:
        '200':
          description: Tenant limits updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantLimitsMutationResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/tenants/{tenantId}/settings:
    get:
      operationId: GetTenantSettingsQuery
      tags: [Tenancy]
      summary: Get tenant settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Tenant settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSettingsResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      operationId: UpdateTenantSettingsCommand
      tags: [Tenancy]
      summary: Replace tenant settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantSettingsRequest'
            examples:
              default:
                value:
                  locale: uz
                  timezone: Asia/Tashkent
                  currency: UZS
      responses:
        '200':
          description: Tenant settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSettingsMutationResponse'
        '403':
          description: Missing permission or conflicting tenant scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics:
    get:
      operationId: ListClinicsQuery
      tags: [Clinics]
      summary: List clinics in the active tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: Clinics in the active tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicCollectionResponse'
        '403':
          description: Missing permission for the active tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      operationId: CreateClinicCommand
      tags: [Clinics]
      summary: Create a clinic in the active tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClinicRequest'
      responses:
        '201':
          description: Clinic created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMutationResponse'
        '409':
          description: Duplicate clinic code in the active tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid clinic payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics/{clinicId}:
    get:
      operationId: GetClinicQuery
      tags: [Clinics]
      summary: Get one clinic in the active tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
        '200':
          description: Clinic detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicResponse'
        '404':
          description: Clinic not found in the active tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      operationId: UpdateClinicCommand
      tags: [Clinics]
      summary: Update a clinic in the active tenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClinicRequest'
      responses:
        '200':
          description: Clinic updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMutationResponse'
        '409':
          description: Duplicate clinic code in the active tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: Invalid clinic payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      operationId: DeleteClinicCommand
      tags: [Clinics]
      summary: Delete an inactive clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
        '200':
          description: Clinic deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMutationResponse'
        '409':
          description: Clinic is still active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics/{clinicId}:activate:
    post:
      operationId: ActivateClinicCommand
      tags: [Clinics]
      summary: Activate an inactive clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
        '200':
          description: Clinic activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMutationResponse'
        '409':
          description: Invalid clinic lifecycle transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics/{clinicId}:deactivate:
    post:
      operationId: DeactivateClinicCommand
      tags: [Clinics]
      summary: Deactivate an active clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
        '200':
          description: Clinic deactivated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMutationResponse'
        '409':
          description: Invalid clinic lifecycle transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics/{clinicId}/settings:
    get:
      operationId: GetClinicSettingsQuery
