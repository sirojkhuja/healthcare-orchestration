                $ref: '#/components/schemas/ClinicWorkHoursResponse'
    put:
      operationId: UpdateClinicWorkHoursCommand
      tags: [Clinics]
      summary: Replace the weekly work hours for a clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClinicWorkHoursRequest'
      responses:
        '200':
          description: Clinic work hours updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicWorkHoursMutationResponse'
