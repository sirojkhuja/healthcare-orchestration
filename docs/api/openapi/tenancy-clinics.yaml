          description: Invalid work-hour payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics/{clinicId}/holidays:
    get:
      operationId: ListClinicHolidaysQuery
      tags: [Clinics]
      summary: List holiday ranges for a clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
        '200':
          description: Clinic holidays
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicHolidayCollectionResponse'
    post:
      operationId: CreateClinicHolidayCommand
      tags: [Clinics]
      summary: Create a holiday range for a clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClinicHolidayRequest'
      responses:
        '201':
          description: Holiday created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicHolidayMutationResponse'
        '409':
          description: Holiday range overlaps another clinic holiday
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
