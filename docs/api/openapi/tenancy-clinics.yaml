      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      responses:
        '200':
          description: Clinic settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicSettingsResponse'
    put:
      operationId: UpdateClinicSettingsCommand
      tags: [Clinics]
      summary: Replace clinic settings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClinicSettingsRequest'
      responses:
        '200':
          description: Clinic settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicSettingsMutationResponse'
        '422':
          description: Invalid clinic settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/clinics/{clinicId}/departments:
