  /api/v1/clinics/{clinicId}/work-hours:
    get:
      operationId: GetClinicWorkHoursQuery
      tags: [Clinics]
      summary: Get the weekly work hours for a clinic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ClinicIdPath'
