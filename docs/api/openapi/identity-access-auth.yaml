openapi: 3.1.1
info:
  title: MedFlow Identity Access Fragment
  version: 0.1.0
paths:
  /api/v1/auth/login:
    post:
      operationId: LoginCommand
      tags: [IdentityAccess]
      summary: Authenticate a user and issue API tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session created
          headers:
            X-Request-Id:
              schema: { type: string, format: uuid }
            X-Correlation-Id:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Invalid credentials or MFA challenge required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorResponse'
                  - $ref: '#/components/schemas/MfaRequiredErrorResponse'
  /api/v1/auth/mfa/setup:
    post:
      operationId: SetupMfaCommand
      tags: [IdentityAccess]
      summary: Start MFA setup for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: MFA setup started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
        '401':
          description: Missing or invalid bearer token
        '409':
          description: MFA is already enabled for the actor
  /api/v1/auth/mfa/verify:
    post:
      operationId: VerifyMfaCommand
      tags: [IdentityAccess]
      summary: Confirm MFA setup or complete an MFA login challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA setup completed or login challenge verified
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MfaEnabledResponse'
                  - $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: MFA challenge is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: MFA code or recovery code is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/auth/mfa/disable:
    post:
      operationId: DisableMfaCommand
      tags: [IdentityAccess]
      summary: Disable MFA for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaDisableRequest'
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaDisabledResponse'
        '401':
          description: Missing or invalid bearer token
        '409':
          description: MFA is not enabled for the actor
        '422':
          description: MFA code or recovery code is invalid
  /api/v1/auth/logout:
    post:
      operationId: LogoutCommand
      tags: [IdentityAccess]
      summary: Revoke the current authenticated session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: logged_out
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/refresh:
    post:
      operationId: RefreshTokenCommand
      tags: [IdentityAccess]
      summary: Rotate the refresh token and issue a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Refresh token is invalid or expired
  /api/v1/auth/me:
    get:
      operationId: GetMeQuery
      tags: [IdentityAccess]
      summary: Return the authenticated API actor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedRequestResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/password/forgot:
    post:
      operationId: RequestPasswordResetCommand
      tags: [IdentityAccess]
      summary: Request a password reset without disclosing account existence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Password reset request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestedResponse'
  /api/v1/auth/password/reset:
    post:
      operationId: ResetPasswordCommand
      tags: [IdentityAccess]
      summary: Reset the user password and revoke all active sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetCompletedResponse'
        '422':
          description: Password reset token is invalid or expired
  /api/v1/auth/sessions:
    post:
      operationId: ListSessionsQuery
      tags: [IdentityAccess]
      summary: List auth sessions for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Auth session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionCollectionResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/sessions/{sessionId}:
    delete:
      operationId: RevokeSessionCommand
      tags: [IdentityAccess]
      summary: Revoke one owned auth session
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Auth session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRevokedResponse'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Auth session not found or not owned by the actor
  /api/v1/auth/api-keys:
    post:
      operationId: CreateApiKeyCommand
      tags: [IdentityAccess]
      summary: Create a managed API key for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: API key created and plaintext returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreatedResponse'
        '401':
          description: Missing or invalid bearer token
    get:
      operationId: ListApiKeysQuery
      tags: [IdentityAccess]
      summary: List managed API keys owned by the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCollectionResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/api-keys/{keyId}:
    delete:
      operationId: RevokeApiKeyCommand
      tags: [IdentityAccess]
      summary: Revoke one owned API key
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyRevokedResponse'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: API key not found or not owned by the actor
  /api/v1/devices:
    get:
      operationId: ListDevicesQuery
      tags: [IdentityAccess]
      summary: List registered devices for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registered device list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCollectionResponse'
        '401':
          description: Missing or invalid bearer token
    post:
      operationId: RegisterDeviceCommand
      tags: [IdentityAccess]
      summary: Register or refresh one user device installation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '200':
          description: Device registered or refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '401':
          description: Missing or invalid bearer token
        '422':
          description: Device payload is invalid
  /api/v1/devices/{deviceId}:
    delete:
      operationId: DeregisterDeviceCommand
      tags: [IdentityAccess]
      summary: Remove one owned registered device
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device deregistered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDeregisteredResponse'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Device not found or not owned by the actor
  /api/v1/security/ip-allowlist:
    get:
      operationId: GetIpAllowlistQuery
      tags: [IdentityAccess]
      summary: Return the active tenant CIDR allowlist
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant IP allowlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantIpAllowlistGetResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
    post:
      operationId: UpdateIpAllowlistCommand
      tags: [IdentityAccess]
      summary: Replace the active tenant CIDR allowlist
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantIpAllowlistUpdateRequest'
      responses:
        '200':
          description: Tenant allowlist replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantIpAllowlistUpdateResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '422':
          description: CIDR payload is invalid
  /api/v1/security/sessions:revoke-all:
    post:
      operationId: RevokeAllSessionsCommand
      tags: [IdentityAccess]
      summary: Revoke every active auth session owned by the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All active auth sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeAllSessionsResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/roles:
    get:
      operationId: ListRolesQuery
      tags: [IdentityAccess]
      summary: List tenant-scoped roles in the active tenant
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant role list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleCollectionResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
    post:
      operationId: CreateRoleCommand
      tags: [IdentityAccess]
      summary: Create a tenant-scoped custom role
      description: Requires `rbac.manage` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreateRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleMutationResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.manage` permission
        '409':
          description: Role name already exists in the active tenant
  /api/v1/roles/{roleId}:
    get:
      operationId: GetRoleQuery
      tags: [IdentityAccess]
      summary: Return one tenant-scoped role
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant role detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleGetResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
        '404':
          description: Role not found in the active tenant
    patch:
      operationId: UpdateRoleCommand
      tags: [IdentityAccess]
      summary: Update one tenant-scoped role
      description: Requires `rbac.manage` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdateRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleMutationResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.manage` permission
        '404':
          description: Role not found in the active tenant
        '409':
          description: Role name already exists in the active tenant
    delete:
      operationId: DeleteRoleCommand
      tags: [IdentityAccess]
      summary: Delete one unassigned tenant-scoped role
      description: Requires `rbac.manage` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleDeletedResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.manage` permission
        '404':
          description: Role not found in the active tenant
        '409':
          description: Role is still assigned to one or more users
  /api/v1/roles/{roleId}/permissions:
    get:
      operationId: ListRolePermissionsQuery
      tags: [IdentityAccess]
      summary: List permissions assigned to one tenant-scoped role
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role permission list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionCollectionResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
        '404':
          description: Role not found in the active tenant
    put:
      operationId: SetRolePermissionsCommand
      tags: [IdentityAccess]
      summary: Replace the full permission set for one tenant-scoped role
      description: Requires `rbac.manage` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolePermissionsUpdateRequest'
      responses:
        '200':
          description: Role permissions replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePermissionsUpdateResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.manage` permission
        '404':
          description: Role not found in the active tenant
        '422':
          description: Permission payload is invalid
  /api/v1/permissions:
    get:
      operationId: ListPermissionsQuery
      tags: [IdentityAccess]
      summary: List the static permission catalog
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Flat permission catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionCollectionResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
  /api/v1/permissions/groups:
    get:
      operationId: ListPermissionGroupsQuery
      tags: [IdentityAccess]
      summary: List the static permission catalog grouped by group key
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Grouped permission catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionGroupCollectionResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
  /api/v1/users/{userId}/roles:
    get:
      operationId: ListUserRolesQuery
      tags: [IdentityAccess]
      summary: List the tenant-scoped roles assigned to one user
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User role assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleCollectionResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
        '404':
          description: User not found
    put:
      operationId: SetUserRolesCommand
      tags: [IdentityAccess]
      summary: Replace the full tenant-scoped role set for one user
      description: Requires `rbac.manage` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRolesUpdateRequest'
      responses:
        '200':
          description: User roles replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRolesUpdateResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.manage` permission
        '404':
          description: User not found
        '422':
          description: One or more role ids do not belong to the active tenant
  /api/v1/users/{userId}/permissions:
    get:
      operationId: GetUserPermissionsQuery
      tags: [IdentityAccess]
      summary: Return the effective permissions for one user in the active tenant
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Effective user permission set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPermissionSetResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
        '404':
          description: User not found
  /api/v1/rbac/audit:
    get:
      operationId: GetRbacAuditQuery
      tags: [IdentityAccess]
      summary: Return recent tenant-scoped RBAC audit events
      description: Requires `rbac.view` permission in the active tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Recent RBAC audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RbacAuditCollectionResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '403':
          description: Missing `rbac.view` permission
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    MfaVerifyRequest:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
        recovery_code:
          type: string
    MfaDisableRequest:
      type: object
      properties:
        code:
          type: string
        recovery_code:
          type: string
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConfirmRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
    ApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 120
        expires_at:
          type: [string, 'null']
          format: date-time
    DeviceRegisterRequest:
      type: object
      required: [installation_id, name, platform]
      properties:
        installation_id:
          type: string
          maxLength: 128
        name:
          type: string
          maxLength: 120
        platform:
          type: string
          enum: [ios, android, web, desktop]
        push_token:
          type: [string, 'null']
        app_version:
