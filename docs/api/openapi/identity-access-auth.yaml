openapi: 3.1.1
info:
  title: MedFlow Identity Access Auth Fragment
  version: 0.1.0
paths:
  /api/v1/auth/login:
    post:
      operationId: LoginCommand
      tags: [IdentityAccess]
      summary: Authenticate a user and issue API tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session created
          headers:
            X-Request-Id:
              schema: { type: string, format: uuid }
            X-Correlation-Id:
              schema: { type: string, format: uuid }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Invalid credentials or MFA challenge required
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ApiErrorResponse'
                  - $ref: '#/components/schemas/MfaRequiredErrorResponse'
  /api/v1/auth/mfa/setup:
    post:
      operationId: SetupMfaCommand
      tags: [IdentityAccess]
      summary: Start MFA setup for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: MFA setup started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
        '401':
          description: Missing or invalid bearer token
        '409':
          description: MFA is already enabled for the actor
  /api/v1/auth/mfa/verify:
    post:
      operationId: VerifyMfaCommand
      tags: [IdentityAccess]
      summary: Confirm MFA setup or complete an MFA login challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA setup completed or login challenge verified
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MfaEnabledResponse'
                  - $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: MFA challenge is invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '422':
          description: MFA code or recovery code is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/auth/mfa/disable:
    post:
      operationId: DisableMfaCommand
      tags: [IdentityAccess]
      summary: Disable MFA for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaDisableRequest'
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaDisabledResponse'
        '401':
          description: Missing or invalid bearer token
        '409':
          description: MFA is not enabled for the actor
        '422':
          description: MFA code or recovery code is invalid
  /api/v1/auth/logout:
    post:
      operationId: LogoutCommand
      tags: [IdentityAccess]
      summary: Revoke the current authenticated session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: logged_out
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/refresh:
    post:
      operationId: RefreshTokenCommand
      tags: [IdentityAccess]
      summary: Rotate the refresh token and issue a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token pair rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Refresh token is invalid or expired
  /api/v1/auth/me:
    get:
      operationId: GetMeQuery
      tags: [IdentityAccess]
      summary: Return the authenticated API actor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedRequestResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/password/forgot:
    post:
      operationId: RequestPasswordResetCommand
      tags: [IdentityAccess]
      summary: Request a password reset without disclosing account existence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Password reset request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestedResponse'
  /api/v1/auth/password/reset:
    post:
      operationId: ResetPasswordCommand
      tags: [IdentityAccess]
      summary: Reset the user password and revoke all active sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetCompletedResponse'
        '422':
          description: Password reset token is invalid or expired
  /api/v1/auth/sessions:
    post:
      operationId: ListSessionsQuery
      tags: [IdentityAccess]
      summary: List auth sessions for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Auth session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionCollectionResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/sessions/{sessionId}:
    delete:
      operationId: RevokeSessionCommand
      tags: [IdentityAccess]
      summary: Revoke one owned auth session
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Auth session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRevokedResponse'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Auth session not found or not owned by the actor
  /api/v1/auth/api-keys:
    post:
      operationId: CreateApiKeyCommand
      tags: [IdentityAccess]
      summary: Create a managed API key for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreateRequest'
      responses:
        '201':
          description: API key created and plaintext returned once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreatedResponse'
        '401':
          description: Missing or invalid bearer token
    get:
      operationId: ListApiKeysQuery
      tags: [IdentityAccess]
      summary: List managed API keys owned by the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCollectionResponse'
        '401':
          description: Missing or invalid bearer token
  /api/v1/auth/api-keys/{keyId}:
    delete:
      operationId: RevokeApiKeyCommand
      tags: [IdentityAccess]
      summary: Revoke one owned API key
      security:
        - bearerAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyRevokedResponse'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: API key not found or not owned by the actor
  /api/v1/devices:
    get:
      operationId: ListDevicesQuery
      tags: [IdentityAccess]
      summary: List registered devices for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registered device list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceCollectionResponse'
        '401':
          description: Missing or invalid bearer token
    post:
      operationId: RegisterDeviceCommand
      tags: [IdentityAccess]
      summary: Register or refresh one user device installation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '200':
          description: Device registered or refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '401':
          description: Missing or invalid bearer token
        '422':
          description: Device payload is invalid
  /api/v1/devices/{deviceId}:
    delete:
      operationId: DeregisterDeviceCommand
      tags: [IdentityAccess]
      summary: Remove one owned registered device
      security:
        - bearerAuth: []
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device deregistered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDeregisteredResponse'
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Device not found or not owned by the actor
  /api/v1/security/ip-allowlist:
    get:
      operationId: GetIpAllowlistQuery
      tags: [IdentityAccess]
      summary: Return the active tenant CIDR allowlist
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant IP allowlist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantIpAllowlistGetResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
    post:
      operationId: UpdateIpAllowlistCommand
      tags: [IdentityAccess]
      summary: Replace the active tenant CIDR allowlist
      security:
        - bearerAuth: []
      parameters:
        - name: X-Tenant-Id
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantIpAllowlistUpdateRequest'
      responses:
        '200':
          description: Tenant allowlist replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantIpAllowlistUpdateResponse'
        '400':
          description: Tenant context missing or invalid
        '401':
          description: Missing or invalid bearer token
        '422':
          description: CIDR payload is invalid
  /api/v1/security/sessions:revoke-all:
    post:
      operationId: RevokeAllSessionsCommand
      tags: [IdentityAccess]
      summary: Revoke every active auth session owned by the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All active auth sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeAllSessionsResponse'
        '401':
          description: Missing or invalid bearer token
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    MfaVerifyRequest:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
        recovery_code:
          type: string
    MfaDisableRequest:
      type: object
      properties:
        code:
          type: string
        recovery_code:
          type: string
    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    PasswordResetConfirmRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
    ApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 120
        expires_at:
          type: [string, 'null']
          format: date-time
    DeviceRegisterRequest:
      type: object
      required: [installation_id, name, platform]
      properties:
        installation_id:
          type: string
          maxLength: 128
        name:
          type: string
          maxLength: 120
        platform:
          type: string
          enum: [ios, android, web, desktop]
        push_token:
          type: [string, 'null']
        app_version:
          type: [string, 'null']
    TenantIpAllowlistUpdateRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            type: object
            required: [cidr]
            properties:
              cidr:
                type: string
              label:
                type: [string, 'null']
    AuthSessionResponse:
      type: object
      required: [user, session, tokens]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        session:
          $ref: '#/components/schemas/SessionSummary'
        tokens:
          $ref: '#/components/schemas/Tokens'
    AuthenticatedRequestResponse:
      type: object
      required: [user, session]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        session:
          $ref: '#/components/schemas/SessionSummary'
    PasswordResetRequestedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: password_reset_requested
    PasswordResetCompletedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: password_reset
    MfaSetupResponse:
      type: object
      required: [status, credential, secret, otpauth_uri, recovery_codes]
      properties:
        status:
          type: string
          const: mfa_setup_pending
        credential:
          $ref: '#/components/schemas/SessionSummary'
        secret:
          type: string
        otpauth_uri:
          type: string
        recovery_codes:
          type: array
          items:
            type: string
    MfaEnabledResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: mfa_enabled
    MfaDisabledResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: mfa_disabled
    AuthSessionCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuthSessionView'
    ApiKeyCreatedResponse:
      type: object
      required: [status, api_key, plaintext_key]
      properties:
        status:
          type: string
          const: api_key_created
        api_key:
          $ref: '#/components/schemas/ApiKeySummary'
        plaintext_key:
          type: string
    ApiKeyCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeySummary'
    DeviceResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          const: device_registered
        data:
          $ref: '#/components/schemas/DeviceSummary'
    DeviceCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeviceSummary'
    TenantIpAllowlistGetResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IpAllowlistEntry'
    TenantIpAllowlistUpdateResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          const: ip_allowlist_updated
        data:
          type: array
          items:
            $ref: '#/components/schemas/IpAllowlistEntry'
    ApiErrorResponse:
      type: object
      required: [code, message, details, trace_id, correlation_id]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
        correlation_id:
          type: string
    MfaRequiredErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiErrorResponse'
        - type: object
          properties:
            code:
              type: string
              const: MFA_REQUIRED
            details:
              type: object
              required: [challenge_id, expires_at]
              properties:
                challenge_id:
                  type: string
                  format: uuid
                expires_at:
                  type: string
                  format: date-time
    SessionRevokedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: session_revoked
    ApiKeyRevokedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: api_key_revoked
    DeviceDeregisteredResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          const: device_deregistered
    RevokeAllSessionsResponse:
      type: object
      required: [status, revoked_sessions]
      properties:
        status:
          type: string
          const: all_sessions_revoked
        revoked_sessions:
          type: integer
          minimum: 0
    UserSummary:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    SessionSummary:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
    ApiKeySummary:
      type: object
      required: [id, name, prefix, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        last_used_at:
          type: [string, 'null']
          format: date-time
        expires_at:
          type: [string, 'null']
          format: date-time
        revoked_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
    DeviceSummary:
      type: object
      required:
        - id
        - installation_id
        - name
        - platform
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        installation_id:
          type: string
        name:
          type: string
        platform:
          type: string
          enum: [ios, android, web, desktop]
        push_token:
          type: [string, 'null']
        app_version:
          type: [string, 'null']
        ip_address:
          type: [string, 'null']
        user_agent:
          type: [string, 'null']
        last_seen_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    IpAllowlistEntry:
      type: object
      required: [id, cidr, created_at]
      properties:
        id:
          type: string
          format: uuid
        cidr:
          type: string
        label:
          type: [string, 'null']
        created_at:
          type: string
          format: date-time
    AuthSessionView:
      type: object
      required:
        - id
        - current
        - access_token_expires_at
        - refresh_token_expires_at
        - created_at
      properties:
        id:
          type: string
          format: uuid
        current:
          type: boolean
        ip_address:
          type: [string, 'null']
        user_agent:
          type: [string, 'null']
        access_token_expires_at:
          type: string
          format: date-time
        refresh_token_expires_at:
          type: string
          format: date-time
        last_used_at:
          type: [string, 'null']
          format: date-time
        revoked_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
    Tokens:
      type: object
      required:
        - token_type
        - access_token
        - access_token_expires_at
        - refresh_token
        - refresh_token_expires_at
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
        access_token_expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
        refresh_token_expires_at:
          type: string
          format: date-time
