services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      HOME: /tmp
      COMPOSER_HOME: /tmp/composer
      npm_config_cache: /tmp/npm
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - backend

  node:
    image: node:22-bookworm
    environment:
      HOME: /tmp
      npm_config_cache: /tmp/npm
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend

  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: medflow
      POSTGRES_USER: medflow
      POSTGRES_PASSWORD: medflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medflow -d medflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    build:
      context: .
      dockerfile: docker/redis/Dockerfile
    volumes:
      - redis-data:/data
    networks:
      - backend

  kafka:
    image: apache/kafka:4.2.0
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - backend

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.146.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    profiles:
      - observability
    volumes:
      - ./docker/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.10.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=/prometheus/
      - --web.route-prefix=/prometheus
      - --web.enable-lifecycle
    profiles:
      - observability
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - nginx
    networks:
      - backend

  grafana:
    image: grafana/grafana:12.3.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    profiles:
      - observability
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    profiles:
      - observability
    networks:
      - backend

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_BASEPATH: /kibana
      SERVER_REWRITEBASEPATH: "true"
    depends_on:
      - elasticsearch
    profiles:
      - observability
    networks:
      - backend

  fluent-bit:
    image: fluent/fluent-bit:3.2.5
    profiles:
      - observability
    depends_on:
      - elasticsearch
    volumes:
      - ./:/var/www/html:ro
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
